services:
  - type: web
    name: bocadoapp-backend
    env: node
    buildCommand: npm install && npm run prisma:generate --workspace=apps/backend
    startCommand: npm start --workspace=apps/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
